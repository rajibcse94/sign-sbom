name: SBOM
on: [push, pull_request]

# Principle of least privilege: GITHUB_TOKEN only needs to read repo contents
# to clone the code. We don't push, comment, or modify anything. Explicit
# permissions block silences the CodeQL "missing-workflow-permissions" alert.
permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ledgerprove/sign-sbom@v1
        with:
          api-key: ${{ secrets.LEDGERPROVE_API_KEY }}
